name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: agentprov
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: agentprov
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: agentprov
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: agentprov.exe
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package Unix
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/
          tar -C dist -czf agentprov-${{ matrix.target }}.tar.gz ${{ matrix.bin }}
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.bin }} dist/
          Compress-Archive -Path dist/${{ matrix.bin }} -DestinationPath agentprov-${{ matrix.target }}.zip
      - uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: agentprov-${{ matrix.target }}.*
